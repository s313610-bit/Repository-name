<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頂級炭火燒肉 - BBQ 大挑戰</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --grill-border: #4d4d4d;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 {
            color: #ff4757;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.6);
            font-size: 2.2rem;
        }
        .status-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 10px;
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #333;
        }
        .status-item span {
            font-weight: bold;
            color: #ffa502;
        }
        
        /* 烤爐與炭火 */
        .grill-container {
            width: 90%;
            max-width: 650px;
            height: 380px;
            background: 
                radial-gradient(circle at 50% 50%, rgba(255, 69, 0, 0.8) 0%, rgba(255, 0, 0, 0.5) 40%, #111 80%),
                repeating-linear-gradient(45deg, #111, #111 10px, #222 10px, #222 20px);
            border: 18px solid var(--grill-border);
            border-radius: 30px;
            margin: 0 auto;
            position: relative;
            box-shadow: inset 0 0 30px #000, 0 15px 30px rgba(0,0,0,0.7);
            overflow: hidden;
        }
        /* 網格鐵絲 */
        .grill-net {
            position: absolute;
            width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(255,255,255,0.2) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 25px 25px;
            z-index: 1;
        }
        .meat-area {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 2;
        }

        /* ================= 擬真肉片設計 ================= */
        .meat {
            width: 110px;
            height: 75px;
            border-radius: 60% 40% 55% 45% / 50% 45% 55% 50%; /* 不規則肉片形狀 */
            position: absolute;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 3px 8px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }
        
        /* 狀態 1：太生 (帶有大理石脂肪油花紋路) */
        .meat.raw {
            background: 
                radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.6) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 60%, rgba(255,255,255,0.4) 0%, transparent 30%),
                linear-gradient(135deg, #ff4d4d, #d63031);
            color: #fff;
            border: 1px solid #ff7675;
        }

        /* 狀態 2：剛好 (炙燒棕色 + 烤網焦痕) */
        .meat.perfect {
            background: 
                /* 烤網條紋 (Grill Marks) */
                linear-gradient(45deg, transparent 45%, #2d1e18 45%, #2d1e18 55%, transparent 55%),
                linear-gradient(-45deg, transparent 45%, #2d1e18 45%, #2d1e18 55%, transparent 55%),
                /* 肉質炙燒漸層 */
                radial-gradient(circle, #8a5a36 0%, #5c3a21 80%);
            background-size: 20px 20px, 20px 20px, 100% 100%;
            color: #f1c40f;
            border: 2px solid #e67e22;
            box-shadow: 0 0 20px #ff9f43, 3px 8px 15px rgba(0,0,0,0.6);
            transform: scale(1.02);
        }

        /* 狀態 3：烤焦 (縮小、炭黑、死灰質感) */
        .meat.burnt {
            background: radial-gradient(circle, #2d3436 0%, #1e272e 80%);
            color: #7f8c8d;
            border: 1px solid #000;
            transform: scale(0.88); /* 烤焦縮水 */
            box-shadow: 1px 3px 5px rgba(0,0,0,0.8);
        }

        /* 提示文字樣式 */
        .meat .status-lbl {
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-top: 2px;
        }

        /* ================= 介面蓋板 (開始與結束) ================= */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e1e1e 0%, #0f0f0f 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .overlay-content {
            background: rgba(34, 34, 34, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ff4757;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(255, 69, 0, 0.3);
        }
        .overlay h2 {
            font-size: 2.5rem;
            color: #ff4757;
            margin-top: 0;
            text-shadow: 0 0 15px rgba(255,71,87,0.4);
        }
        .overlay p {
            font-size: 1.1rem;
            color: #ccc;
            line-height: 1.6;
            text-align: left;
        }
        .btn {
            background: linear-gradient(to bottom, #ff4757, #e84118);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 5px 0 #c23616, 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        .btn:hover {
            background: linear-gradient(to bottom, #ff6b81, #ff4757);
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #c23616;
        }
        .instructions {
            margin-top: 20px; font-size: 0.95rem; color: #a4b0be;
        }
    </style>
</head>
<body>

    <div class="overlay" id="start-overlay">
        <div class="overlay-content">
            <h2>🔥 頂級炭火燒肉店</h2>
            <p>歡迎來到自動烤肉職人挑戰！身為一名合格的燒肉師傅，你必須精準掌控每一片肉的熟度：</p>
            <p style="color: #ff7675;">• <b>太生</b>：肉質呈鮮紅色，還有白色油花，不能出菜！</p>
            <p style="color: #f1c40f;">• <b>剛好</b>：肉面呈現黃褐炙燒色，並浮現<b>完美烤網條紋</b>。請立刻收肉！</p>
            <p style="color: #7f8c8d;">• <b>烤焦</b>：太晚收肉會導致肉片縮小並碳化變黑，直接報廢！</p>
            <button class="btn" onclick="startGame()">開始職人修練</button>
        </div>
    </div>

    <div class="overlay" id="game-overlay" style="display: none;">
        <div class="overlay-content">
            <h2 id="overlay-title">🎉 恭喜過關！</h2>
            <p id="overlay-desc">下一關難度將會提升。</p>
            <button class="btn" id="overlay-btn" onclick="handleOverlayClick()">下一關</button>
        </div>
    </div>

    <h1>🔥 頂級炭火燒肉 - 職人挑戰 🔥</h1>
    
    <div class="status-board">
        <div class="status-item">關卡: <span id="level">1</span>/5</div>
        <div class="status-item">總得分: <span id="score">0</span></div>
        <div class="status-item">本關目標: 成功烤好 <span id="target">3</span> 片</div>
        <div class="status-item">已完成: <span id="cooked-count">0</span> 片</div>
    </div>

    <div class="grill-container">
        <div class="grill-net"></div>
        <div class="meat-area" id="meat-area"></div>
    </div>

    <p class="instructions">💡 玩法提示：點擊烤網空位會放上生肉。當肉片浮現<b>「網格烤痕與金光」</b>時立刻點擊收肉得分！</p>

    <script>
        let currentLevel = 1;
        let score = 0;
        let successfulCookedInLevel = 0;
        let activeMeatsCount = 0;
        
        const levelSettings = {
            1: { target: 3, speed: 1.0 },
            2: { target: 5, speed: 1.25 },
            3: { target: 6, speed: 1.5 },
            4: { target: 8, speed: 1.8 },
            5: { target: 10, speed: 2.1 }
        };

        // 三個步驟：0=太生, 1=剛好, 2=烤焦
        const MEAT_STATES = { RAW: 0, PERFECT: 1, BURNT: 2 };

        const meatArea = document.getElementById('meat-area');
        const gameOverlay = document.getElementById('game-overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const overlayBtn = document.getElementById('overlay-btn');

        // 點擊歡迎畫面的「開始職人修練」
        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            startLevel();
        }

        function showOverlay(title, desc, btnText) {
            overlayTitle.innerText = title;
            overlayDesc.innerText = desc;
            overlayBtn.innerText = btnText;
            gameOverlay.style.display = 'flex';
        }

        function handleOverlayClick() {
            gameOverlay.style.display = 'none';
            if (currentLevel > 5) {
                currentLevel = 1;
                score = 0;
                document.getElementById('score').innerText = score;
            }
            startLevel();
        }

        function startLevel() {
            successfulCookedInLevel = 0;
            activeMeatsCount = 0;
            meatArea.innerHTML = '';
            updateUI();
            maintainMeatPopulation();
        }

        function updateUI() {
            document.getElementById('level').innerText = currentLevel;
            document.getElementById('target').innerText = levelSettings[currentLevel].target;
            document.getElementById('cooked-count').innerText = successfulCookedInLevel;
        }

        function maintainMeatPopulation() {
            const maxMeatsOnGrill = Math.min(3 + currentLevel, 6);
            const needed = maxMeatsOnGrill - activeMeatsCount;
            
            if (successfulCookedInLevel < levelSettings[currentLevel].target && activeMeatsCount < maxMeatsOnGrill) {
                for(let i=0; i < needed; i++) {
                    setTimeout(() => {
                        if (successfulCookedInLevel < levelSettings[currentLevel].target) {
                            createMeat();
                        }
                    }, Math.random() * 1200);
                }
            }
        }

        function createMeat() {
            activeMeatsCount++;
            const meat = document.createElement('div');
            
            // 初始狀態：步驟 1. 太生 (raw)
            meat.className = 'meat raw';
            
            // 隨機角度旋轉，讓肉片看起來更自然生動
            const randomRotation = Math.floor(Math.random() * 360);
            meat.style.transform = `rotate(${randomRotation}deg)`;

            // 限制在烤網內部的隨機座標
            const posX = Math.random() * (meatArea.clientWidth - 130) + 10;
            const posY = Math.random() * (meatArea.clientHeight - 95) + 10;
            meat.style.left = `${posX}px`;
            meat.style.top = `${posY}px`;

            meat.innerHTML = `<span>🥩 A5 和牛</span><span class="status-lbl">太生</span>`;

            let state = MEAT_STATES.RAW;
            const baseInterval = 2200; // 每個階段演變時間 (毫秒)
            const tickTime = baseInterval / levelSettings[currentLevel].speed;

            // 熟成進度計時器
            let timer = setInterval(() => {
                state++;
                if (state === MEAT_STATES.PERFECT) {
                    // 步驟 2. 剛好 (完美炙燒)
                    meat.className = 'meat perfect';
                    meat.style.transform = `rotate(${randomRotation}deg) scale(1.05)`;
                    meat.innerHTML = `<span>🔥 完美熟度</span><span class="status-lbl" style="color:#fff; background:#e67e22;">快起鍋！</span>`;
                } else if (state === MEAT_STATES.BURNT) {
                    // 步驟 3. 烤焦 (碳化報廢)
                    meat.className = 'meat burnt';
                    meat.style.transform = `rotate(${randomRotation}deg) scale(0.88)`;
                    meat.innerHTML = `<span>💀 變成黑炭</span><span class="status-lbl">已烤焦</span>`;
                    clearInterval(timer);
                }
            }, tickTime);

            // 點擊夾起肉片
            meat.onclick = () => {
                clearInterval(timer);
                meat.onclick = null; 

                // 儲存當前旋轉，避免特效動畫干擾
                meat.style.transform = `rotate(${randomRotation}deg) scale(1.3)`;
                meat.style.opacity = '0';
                meat.style.transition = 'all 0.3s ease';

                if (state === MEAT_STATES.RAW) {
                    alert('太生了！這肉還在對你叫，請再烤一下。');
                    removeMeat(meat);
                    maintainMeatPopulation();
                } else if (state === MEAT_STATES.PERFECT) {
                    // 成功獲得完美肉片
                    score += 150 * currentLevel;
                    successfulCookedInLevel++;
                    document.getElementById('score').innerText = score;
                    updateUI();
                    
                    setTimeout(() => {
                        removeMeat(meat);
                        checkLevelProgress();
                    }, 300);
                } else if (state === MEAT_STATES.BURNT) {
                    alert('烤焦的肉不能給客人吃！浪費食材。');
                    setTimeout(() => {
                        removeMeat(meat);
                        maintainMeatPopulation();
                    }, 300);
                }
            };

            meatArea.appendChild(meat);
        }

        function removeMeat(element) {
            if (element.parentNode) {
                element.parentNode.removeChild(element);
                activeMeatsCount--;
            }
        }

        function checkLevelProgress() {
            if (successfulCookedInLevel >= levelSettings[currentLevel].target) {
                meatArea.innerHTML = '';
                activeMeatsCount = 0;

                if (currentLevel < 5) {
                    currentLevel++;
                    showOverlay(`🎉 順利過關！`, `技術越來越好了！準備晉升到第 ${currentLevel} 關。`, "挑戰下一關");
                } else {
                    currentLevel++; 
                    showOverlay(`🏆 傳奇燒肉大師！`, `太神啦！你成功通過了最高難度的試煉！\n職人總積分：${score} 分`, "重回大師之路");
                }
            } else {
                maintainMeatPopulation();
            }
        }
    </script>
</body>
</html>
